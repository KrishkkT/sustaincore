<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SustainCore Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue: #0047FF;
            --brand-green: #00FF94;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: white;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
        }

        .admin-input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .admin-input:focus {
            border-color: var(--brand-blue);
            background: rgba(0, 71, 255, 0.05);
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 71, 255, 0.1);
        }

        select option {
            background: #0a0a0a;
            color: white;
            padding: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-blue), #0030AD);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 11px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 71, 255, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 11px;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .edit-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.5s ease forwards;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            padding: 16px 32px;
            border-radius: 12px;
            background: var(--brand-blue);
            color: white;
            font-weight: 900;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-18116601419"></script>
<script>

<body class="p-8 md:p-20 overflow-x-hidden">

    <div class="max-w-7xl mx-auto">
        <header class="mb-20 flex flex-col md:flex-row md:items-center justify-between gap-8">
            <div>
                <h1 class="text-6xl font-black tracking-tighter mb-4 leading-none">INTELLIGENCE<br /><span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-emerald-400">DASHBOARD</span>
                </h1>
                <p class="text-white/40 text-lg max-w-xl font-medium">Global advisory management system. Deploy
                    technical briefings and environmental intelligence live.</p>
            </div>
            <div class="flex gap-4">
                <a href="insights.html" class="btn-secondary">View Live Hub</a>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
            <!-- Step 1: AI Engine -->
            <div class="admin-card p-12">
                <label class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-6 block">Step 01. INTEL
                    OPTIMIZATION ENGINE</label>
                <textarea id="raw-intel" class="w-full admin-input h-64 p-8 mb-8 text-sm leading-relaxed"
                    placeholder="Paste your raw intelligence, bullet points, or news here..."></textarea>
                <button onclick="optimizeAI()" id="opt-btn"
                    class="btn-primary w-full flex items-center justify-center gap-4">
                    <span>Optimize with Intelligence</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </button>
            </div>

            <!-- Step 2: Workspace -->
            <div id="publish-flow"
                class="admin-card p-12 grayscale opacity-20 pointer-events-none transition-all duration-700">
                <label class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-10 block">Step 02.
                    BROADCAST WORKSPACE</label>

                <div class="space-y-8">
                    <div>
                        <label class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-4 block">1.
                            DEFINITIVE HEADLINE</label>
                        <input type="text" id="final-title" class="w-full admin-input px-6 py-5 text-sm">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-4 block">2.
                            EXECUTIVE SUMMARY (DESCRIPTION)</label>
                        <textarea id="final-desc" class="w-full admin-input h-24 px-6 py-5 text-sm"></textarea>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-4 block">3.
                            TECHNICAL BRIEF (CONTENT)</label>
                        <textarea id="final-content"
                            class="w-full admin-input h-64 px-6 py-5 text-sm leading-relaxed"></textarea>
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-4 block">4.
                            FEATURED IMAGE URL</label>
                        <input type="text" id="final-image" placeholder="https://images.unsplash.com/photo-..."
                            class="w-full admin-input px-6 py-5 text-sm">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4">
                        <div>
                            <label
                                class="text-[9px] font-black text-white/20 uppercase tracking-[0.2em] mb-3 block">AUTHOR</label>
                            <input type="text" id="final-author" value="SustainCore Analyst"
                                class="w-full admin-input px-4 py-3 text-[10px]">
                        </div>
                        <div>
                            <label
                                class="text-[9px] font-black text-white/20 uppercase tracking-[0.2em] mb-3 block">CATEGORY</label>
                            <input type="text" id="final-cat" value="Intelligence"
                                class="w-full admin-input px-4 py-3 text-[10px]">
                        </div>
                        <div>
                            <label
                                class="text-[9px] font-black text-white/20 uppercase tracking-[0.2em] mb-3 block">ACCENT</label>
                            <select id="final-accent" class="w-full admin-input px-4 py-3 text-[10px]">
                                <option value="blue">Sustain Blue</option>
                                <option value="green">Eco Green</option>
                                <option value="emerald">Policy Emerald</option>
                            </select>
                        </div>
                    </div>

                    <button onclick="publishArticle()" class="btn-primary w-full mt-10" id="pub-btn">
                        DISPATCH TO LIVE NETWORK
                    </button>
                    <button onclick="resetForm()" class="btn-secondary w-full">CANCEL / CLEAR</button>
                </div>
            </div>
        </div>

        <!-- Management Sections -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 mt-20">

            <!-- Live Article Manager -->
            <div class="animate-fade">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h2 class="text-2xl font-black tracking-tighter uppercase">Article Manager</h2>
                        <p class="text-white/40 text-[10px] uppercase font-bold mt-1">Global Intelligence Live</p>
                    </div>
                    <button onclick="loadArticles()" class="btn-secondary px-6 py-3 text-[9px]">
                        Refresh
                    </button>
                </div>

                <div class="admin-card overflow-hidden">
                    <div id="articles-list" class="divide-y divide-white/5 max-h-[500px] overflow-y-auto scroll-thin">
                        <div class="p-20 text-center text-white/20 italic">Loading insights...</div>
                    </div>
                </div>
            </div>

            <!-- Audience Hub -->
            <div class="animate-fade" style="animation-delay: 0.2s">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h2 class="text-2xl font-black tracking-tighter uppercase">Audience Hub</h2>
                        <p class="text-white/40 text-[10px] uppercase font-bold mt-1">Network Subscribers</p>
                    </div>
                    <button onclick="loadSubscribers()" class="btn-secondary px-6 py-3 text-[9px]">
                        Refresh
                    </button>
                </div>

                <div class="admin-card overflow-hidden">
                    <div id="subscribers-list"
                        class="divide-y divide-white/5 max-h-[500px] overflow-y-auto scroll-thin">
                        <div class="p-20 text-center text-white/20 italic">Loading audience...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Intelligence Dispatched</div>
    <input type="hidden" id="edit-id" value="">

    <script>
        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = type === 'error' ? '#FF0047' : '#0047FF';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function optimizeAI() {
            const rawText = document.getElementById('raw-intel').value;
            if (!rawText || rawText.trim().length < 10) {
                return showToast("Intelligence must be at least 10 characters", "error");
            }

            const btn = document.getElementById('opt-btn');
            btn.innerHTML = 'Analyzing Intelligence...';
            btn.classList.add('opacity-50', 'pointer-events-none');

            try {
                const response = await fetch('/api/ai-optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rawText })
                });

                const res = await response.json();
                if (res.success) {
                    document.getElementById('final-title').value = res.data.title;
                    document.getElementById('final-desc').value = res.data.description;
                    document.getElementById('final-content').value = res.data.content;
                    document.getElementById('final-image').value = res.data.imageUrl || "";
                    document.getElementById('publish-flow').classList.remove('grayscale', 'opacity-20', 'pointer-events-none');
                    showToast("Optimization Complete");
                } else {
                    showToast(res.error || "Optimization Failed", "error");
                }
            } catch (e) {
                showToast("System Connection Error", "error");
            } finally {
                btn.innerHTML = 'Optimize with Intelligence';
                btn.classList.remove('opacity-50', 'pointer-events-none');
            }
        }

        async function publishArticle() {
            const articleData = {
                title: document.getElementById('final-title').value,
                description: document.getElementById('final-desc').value,
                content: document.getElementById('final-content').value,
                imageUrl: document.getElementById('final-image').value,
                author: document.getElementById('final-author').value || "SustainCore Analyst",
                accent: document.getElementById('final-accent').value,
                category: document.getElementById('final-cat').value
            };

            const editId = document.getElementById('edit-id').value;
            const url = editId ? `/api/articles?id=${editId}` : '/api/articles';
            const method = editId ? 'PATCH' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(articleData)
                });

                if (response.ok) {
                    showToast(editId ? "Article Updated Live" : "Intelligence Dispatched");
                    resetForm();
                    loadArticles();
                } else {
                    const err = await response.json();
                    showToast("Error: " + (err.error || "Broadcast failed"), "error");
                }
            } catch (e) {
                showToast("System Error", "error");
            }
        }

        async function loadArticles() {
            try {
                const res = await fetch('/api/articles');
                const data = await res.json();
                const list = document.getElementById('articles-list');

                if (data.data.length === 0) {
                    list.innerHTML = '<div class="p-20 text-center text-white/20 italic">No articles published yet</div>';
                    return;
                }

                list.innerHTML = data.data.map(art => `
                    <div class="grid grid-cols-12 gap-6 p-6 edit-row transition-all items-center">
                        <div class="col-span-5">
                            <div class="font-bold text-white leading-tight">${art.title}</div>
                            <div class="text-[10px] text-white/30 mt-1 uppercase tracking-wider">${art.author}</div>
                        </div>
                        <div class="col-span-2 text-center">
                            <span class="px-3 py-1 rounded-full bg-white/5 border border-white/5 text-[9px] font-black uppercase text-white/50">${art.category}</span>
                        </div>
                        <div class="col-span-2 text-center text-[10px] font-bold text-white/30">${art.date}</div>
                        <div class="col-span-3 flex justify-end gap-3">
                            <button onclick="editArticle('${art.id}')" class="px-4 py-2 rounded-lg bg-blue-500/10 text-blue-400 text-[10px] font-black uppercase hover:bg-blue-500/20 transition-all border border-blue-500/20">Edit</button>
                            <button onclick="deleteArticle('${art.id}')" class="px-4 py-2 rounded-lg bg-red-500/10 text-red-400 text-[10px] font-black uppercase hover:bg-red-500/20 transition-all border border-red-500/20">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Load failed", e);
            }
        }

        async function loadSubscribers() {
            try {
                const res = await fetch('/api/subscribe');
                const data = await res.json();
                const list = document.getElementById('subscribers-list');

                if (!data.data || data.data.length === 0) {
                    list.innerHTML = '<div class="p-12 text-center text-white/20 italic">No subscribers yet</div>';
                    return;
                }

                list.innerHTML = data.data.map(sub => `
                    <div class="flex items-center justify-between p-6 edit-row transition-all">
                        <div>
                            <div class="font-bold text-white text-sm">${sub.email}</div>
                            <div class="text-[9px] text-white/20 mt-1 uppercase tracking-widest">Joined: ${sub.date || 'Jan 2026'}</div>
                        </div>
                        <div class="w-2 h-2 rounded-full bg-brand-green shadow-[0_0_10px_rgba(0,255,148,0.3)]"></div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Subscribers load failed", e);
            }
        }

        async function editArticle(id) {
            const res = await fetch('/api/articles');
            const data = await res.json();
            const art = data.data.find(a => a.id === id);

            if (art) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                document.getElementById('final-title').value = art.title;
                document.getElementById('final-desc').value = art.description;
                document.getElementById('final-content').value = art.content;
                document.getElementById('final-image').value = art.imageUrl || "";
                document.getElementById('final-author').value = art.author;
                document.getElementById('final-cat').value = art.category;
                document.getElementById('final-accent').value = art.accent;
                document.getElementById('edit-id').value = art.id;

                document.getElementById('publish-flow').classList.remove('grayscale', 'opacity-20', 'pointer-events-none');
                showToast("Editing: " + art.title);
            }
        }

        async function deleteArticle(id) {
            if (!confirm("Are you sure you want to delete this article?")) return;
            const response = await fetch(`/api/articles?id=${id}`, { method: 'DELETE' });
            if (response.ok) {
                showToast("Article Deleted");
                loadArticles();
            }
        }

        function resetForm() {
            document.getElementById('final-title').value = "";
            document.getElementById('final-desc').value = "";
            document.getElementById('final-content').value = "";
            document.getElementById('final-image').value = "";
            document.getElementById('edit-id').value = "";
            document.getElementById('publish-flow').classList.add('grayscale', 'opacity-20', 'pointer-events-none');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadArticles();
            loadSubscribers();
        });
    </script>
</body>

</html>
